commit-msg:
  commands:
    validate-message:
      run: |
        MSG=$(cat "{1}")
        PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9/_-]+\))?: .+'
        if ! echo "$MSG" | grep -qE "$PATTERN"; then
          echo ""
          echo "ERROR: Invalid commit message format."
          echo ""
          echo "  Expected:  type(scope)?: description"
          echo "  Types:     feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
          echo ""
          echo "  Examples:"
          echo "    feat(auth): add JWT refresh token endpoint"
          echo "    fix: handle nil pointer in invoice generation"
          echo "    chore(deps): bump golang.org/x/vuln"
          echo ""
          echo "  Your message: $MSG"
          echo ""
          exit 1
        fi
